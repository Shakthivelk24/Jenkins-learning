{% extends "base.html" %}

{% block title %}404 - Page Not Found{% endblock %}

{% block content %}
<section class="error-page">
    <div class="error-card">
        <h1>404</h1>

        <h2>Oops! Page Not Found</h2>

        <p>
            The page you're looking for doesn't exist or may have been moved.
        </p>

        <div class="error-actions">
            <a href="/" class="btn">🏠 Back to Home</a>

            <a href="{{ GITHUB_URL }}"
               class="btn"
               target="_blank"
               rel="noopener">
                💻 GitHub
            </a>
        </div>
    </div>
</section>

<style>
.error-page{
    min-height:70vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.error-card{
    max-width:600px;
    padding:50px;
    border-radius:20px;
    background:rgba(255,255,255,.05);
    backdrop-filter:blur(12px);
    box-shadow:0 10px 30px rgba(0,0,0,.2);
}

.error-card h1{
    font-size:6rem;
    margin:0;
    color:#ff4d4d;
}

.error-card h2{
    margin:10px 0;
    font-size:2rem;
}

.error-card p{
    color:#bbb;
    margin-bottom:30px;
    line-height:1.6;
}

.error-actions{
    display:flex;
    justify-content:center;
    gap:15px;
    flex-wrap:wrap;
}

.error-actions .btn{
    padding:12px 24px;
    border-radius:10px;
    text-decoration:none;
    font-weight:600;
}
</style>
{% endblock %}
