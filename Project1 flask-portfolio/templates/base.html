<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Shakthi Vel K Portfolio{% endblock %}</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <div class="bg-gradient"></div>

    <header class="nav">
        <div class="brand">
            <span class="logo">SK</span>
            <a class="brand-text" href="/">Shakthi Vel K</a>
        </div>

        <nav class="nav-actions">
            <a class="btn" href="{{ GITHUB_URL }}" target="_blank" rel="noopener">
                💻 GitHub
            </a>
        </nav>
    </header>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <p>
            © {{ current_year }} Shakthi Vel K —
            Built with Flask •
            <a href="{{ GITHUB_URL }}" target="_blank" rel="noopener">
                GitHub
            </a>
        </p>
    </footer>

</body>
</html>
