{% extends "base.html" %}

{% block title %}{{ title }} • Shakthi Vel K{% endblock %}

{% block content %}
<section class="playlist-hero" style="--hero-gradient: {{ gradient }};">
    <h1>{{ title }}</h1>
    <p>Watch the complete playlist directly on this page.</p>
</section>

<section class="player-wrap">
    <div class="player">
        <iframe
            src="https://www.youtube.com/embed/videoseries?list={{ list_id }}"
            title="{{ title }}"
            frameborder="0"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
            referrerpolicy="strict-origin-when-cross-origin"
            allowfullscreen>
        </iframe>
    </div>

    <div class="player-actions">
        <a class="btn" href="/">← Back to Home</a>

        <a class="btn"
           href="https://github.com/Shakthivelk24"
           target="_blank"
           rel="noopener">
            💻 View GitHub
        </a>

        <a class="btn"
           href="https://www.linkedin.com/in/shakthi-vel-k-b35484343/"
           target="_blank"
           rel="noopener">
            ↗ LinkedIn
        </a>
    </div>
</section>

{% endblock %}
